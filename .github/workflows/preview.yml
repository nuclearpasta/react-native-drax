name: Preview Deployments

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-example:
    name: Deploy Example App
    runs-on: ubuntu-latest
    outputs:
      preview-url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_EXAMPLE_PROJECT_ID }}

      - name: Build
        run: vercel build --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_EXAMPLE_PROJECT_ID }}

      - name: Deploy
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token="$VERCEL_TOKEN")
          echo "url=$url" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_EXAMPLE_PROJECT_ID }}

  deploy-docs:
    name: Deploy Docs Site
    runs-on: ubuntu-latest
    outputs:
      preview-url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
        working-directory: docs-site
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_DOCS_PROJECT_ID }}

      - name: Build
        run: vercel build --token="$VERCEL_TOKEN"
        working-directory: docs-site
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_DOCS_PROJECT_ID }}

      - name: Deploy
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token="$VERCEL_TOKEN")
          echo "url=$url" >> "$GITHUB_OUTPUT"
        working-directory: docs-site
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_DOCS_PROJECT_ID }}

  comment:
    name: Post Preview URLs
    needs: [deploy-example, deploy-docs]
    runs-on: ubuntu-latest
    if: always() && (needs.deploy-example.result == 'success' || needs.deploy-docs.result == 'success')
    permissions:
      pull-requests: write
    steps:
      - name: Find existing comment
        uses: peter-evans/find-comment@v3
        id: find
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: "<!-- vercel-preview -->"

      - name: Build comment body
        id: body
        env:
          EXAMPLE_RESULT: ${{ needs.deploy-example.result }}
          EXAMPLE_URL: ${{ needs.deploy-example.outputs.preview-url }}
          DOCS_RESULT: ${{ needs.deploy-docs.result }}
          DOCS_URL: ${{ needs.deploy-docs.outputs.preview-url }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          body="<!-- vercel-preview -->"
          body+=$'\n'"## Preview Deployments"
          body+=$'\n'
          body+=$'\n'"| Project | URL |"
          body+=$'\n'"| ------- | --- |"

          if [ "$EXAMPLE_RESULT" = "success" ]; then
            body+=$'\n'"| Example App | $EXAMPLE_URL |"
          else
            body+=$'\n'"| Example App | :x: Build failed |"
          fi

          if [ "$DOCS_RESULT" = "success" ]; then
            body+=$'\n'"| Docs Site | $DOCS_URL |"
          else
            body+=$'\n'"| Docs Site | :x: Build failed |"
          fi

          body+=$'\n'
          body+=$'\n'"*Updated: $(date -u +"%Y-%m-%d %H:%M UTC") • Commit: ${COMMIT_SHA:0:7}*"

          {
            echo "comment<<COMMENT_EOF"
            echo "$body"
            echo "COMMENT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.body.outputs.comment }}
          edit-mode: replace
